name: Release and Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required for npm trusted publishing (OIDC): lets the job mint a
      # short-lived id-token that npm exchanges for publish rights, so no
      # NPM_TOKEN secret is needed and 2FA is satisfied automatically.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@chrissnell'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter chonky-ui build

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd packages/chonky-ui
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 still ships
      # npm 10.x, so upgrade before publishing.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish
        run: npm publish --access public
        working-directory: packages/chonky-ui

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:'- %s' "$PREV_TAG".."$GITHUB_REF_NAME" -- . ':!.github' | grep -v '^- release:' || true)
          else
            NOTES=$(git log --pretty=format:'- %s' "$GITHUB_REF_NAME" -- . ':!.github' | grep -v '^- release:' || true)
          fi
          {
            echo 'RELEASE_NOTES<<EOF'
            echo "$NOTES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## What's Changed

            ${{ steps.notes.outputs.RELEASE_NOTES }}

            ---
            Published to [npm](https://www.npmjs.com/package/@chrissnell/chonky-ui) as `@chrissnell/chonky-ui@${{ github.ref_name }}`
